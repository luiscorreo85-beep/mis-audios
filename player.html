<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Serenidad · Offline</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: rgba(255,255,255,0.07);
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #a8d8b9;
    --accent2: #6ab187;
    --danger: #f85149;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-weight: 300;
    font-size: 20px;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: #a8d8b9; top: -120px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: #6ab187; bottom: 80px; left: -80px; }
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 500px;
    margin: 0 auto;
    padding: 48px 20px 140px;
  }
  header { margin-bottom: 32px; }
  .logo {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  h1 {
    font-size: 42px;
    font-weight: 300;
    line-height: 1.15;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle {
    font-size: 15px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }
  .settings-btn {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .settings-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .settings-panel.open { display: block; }
  .settings-panel label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }
  .settings-panel input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: monospace;
    outline: none;
  }
  .settings-panel input:focus { border-color: var(--accent2); }
  .settings-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-sm {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    text-align: center;
  }
  .btn-sm:hover { background: var(--surface2); }
  .btn-sm.accent { border-color: var(--accent2); color: var(--accent); }
  .btn-sm.danger { border-color: rgba(248,81,73,0.3); color: var(--danger); }
  .status {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .dot.offline { background: var(--muted); animation: none; }
  .tabs-wrap {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent2); }
  .tab-add {
    padding: 10px 14px;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
  }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 340px;
  }
  .modal h3 {
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 16px;
  }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 12px;
    font-size: 16px;
    outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--accent2); }
  .modal-row { display: flex; gap: 8px; }
  .cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 280px; overflow-y: auto; }
  .cat-option {
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    text-align: left;
  }
  .cat-option:hover { border-color: var(--accent2); color: var(--accent); }
  .play-all-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .btn-mode {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
  }
  .btn-mode:hover { background: var(--surface2); }
  .btn-mode.active { border-color: var(--accent2); color: var(--accent); }
  .audio-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .audio-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .audio-card:hover { border-color: rgba(168,216,185,0.25); background: var(--surface2); }
  .audio-card.active { border-color: var(--accent2); background: rgba(106,177,135,0.06); }
  .play-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    color: var(--muted);
  }
  .audio-card.active .play-icon { background: var(--accent2); border-color: var(--accent2); color: #0d1117; }
  .audio-info { flex: 1; min-width: 0; }
  .audio-title {
    font-size: 17px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .audio-meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 20px;
    border: 1px solid;
  }
  .badge.downloaded { color: var(--accent); border-color: rgba(168,216,185,0.3); }
  .badge.online { color: #e3b341; border-color: rgba(227,179,65,0.3); }
  .badge.cat { color: var(--muted); border-color: var(--border); }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn.fav-on { color: #e3b341; border-color: rgba(227,179,65,0.3); }
  .icon-btn.danger:hover { color: var(--danger); border-color: rgba(248,81,73,0.3); }
  .player-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,17,23,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 20px 24px;
    z-index: 50;
    display: none;
  }
  .player-bar.visible { display: block; }
  .player-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .progress-wrap {
    position: relative;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; width: 0%; }
  .player-controls { display: flex; align-items: center; justify-content: space-between; }
  .time { font-size: 12px; color: var(--muted); min-width: 60px; }
  .time.right { text-align: right; }
  .ctrl-main { display: flex; align-items: center; gap: 16px; }
  .ctrl-btn {
    background: none; border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    padding: 0;
  }
  .ctrl-btn.play-pause {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent2);
    color: #0d1117;
    font-size: 20px;
    border: none;
  }
  audio { display: none; }
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 15px; line-height: 1.6; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .clear-all { text-align: right; margin-bottom: 12px; }
  .clear-all button { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; text-transform: uppercase; }
  .clear-all button:hover { color: var(--danger); }
  .info-offline { background: rgba(106,177,135,0.1); border-radius: 12px; padding: 12px; margin-bottom: 20px; font-size: 13px; text-align: center; border: 1px solid rgba(106,177,135,0.2); }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<button class="settings-btn" onclick="toggleSettings()">⚙</button>
<audio id="audioPlayer"></audio>

<div class="modal-overlay" id="newCatModal">
  <div class="modal">
    <h3>➕ Nueva categoría</h3>
    <input type="text" id="newCatInput" placeholder="Ej: Meditación, Música, Oración..." />
    <div class="modal-row">
      <button class="btn-sm accent" onclick="confirmNewCat()">Crear</button>
      <button class="btn-sm" onclick="closeNewCatModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="assignCatModal">
  <div class="modal">
    <h3 id="assignCatTitle">📂 Asignar categoría</h3>
    <div class="cat-list" id="assignCatList"></div>
    <button class="btn-sm" onclick="closeAssignModal()">Cancelar</button>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="logo">🎧 BIENESTAR · OFFLINE</div>
    <h1>Tu espacio de <em>calma</em></h1>
    <p class="subtitle">Descarga tus audios favoritos y escúchalos sin internet, donde sea.</p>
  </header>

  <div class="settings-panel" id="settingsPanel">
    <label>🔗 URL de tu lista.json (en GitHub)</label>
    <input type="text" id="jsonUrl" placeholder="https://raw.githubusercontent.com/tuusuario/..." />
    <div class="settings-row">
      <button class="btn-sm accent" onclick="saveAndReload()">💾 Guardar y recargar</button>
      <button class="btn-sm danger" onclick="clearAllDownloads()">🗑 Borrar todos los descargados</button>
    </div>
    <div class="settings-row">
      <button class="btn-sm" onclick="exportBackup()">📤 Exportar copia de seguridad</button>
    </div>
  </div>

  <div class="status" id="statusBar">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">Cargando...</span>
  </div>

  <div id="offlineInfo" style="display:none" class="info-offline">
    📴 Sin conexión a internet — Mostrando solo audios descargados
  </div>

  <div class="tabs-wrap" id="tabsWrap" style="display:none">
    <button class="tab active" data-cat="Todos" onclick="switchTab('Todos')">📋 Todos</button>
    <button class="tab" data-cat="Favoritos" onclick="switchTab('Favoritos')">❤️ Favoritos</button>
    <button class="tab-add" onclick="openNewCatModal()" title="Nueva categoría">➕</button>
  </div>

  <div class="play-all-row" id="playAllRow" style="display:none">
    <button class="btn-mode" onclick="playAll()">▶▶ Reproducir todo</button>
    <button class="btn-mode" onclick="playShuffle()">🔀 Aleatorio</button>
  </div>

  <div class="clear-all" id="clearAllRow" style="display:none">
    <button onclick="clearAllDownloads()">🗑 Borrar todos los descargados</button>
  </div>

  <div class="audio-list" id="audioList"></div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-title" id="playerTitle">—</div>
  <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="player-controls">
    <span class="time" id="timeElapsed">0:00</span>
    <div class="ctrl-main">
      <button class="ctrl-btn" onclick="skipAudio(-15)">⏪ -15</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="skipAudio(15)">+15 ⏩</button>
    </div>
    <span class="time right" id="timeDuration">0:00</span>
  </div>
</div>

<script>
// CONFIGURACIÓN
const DEFAULT_JSON = "https://raw.githubusercontent.com/luiscorreo85-beep/mis-audios/main/lista.json";
const STORAGE_KEY = "serenidad_json_url";
const DOWNLOADS_KEY = "serenidad_downloads_v2";
const FAVORITES_KEY = "serenidad_favorites";
const CATEGORIES_KEY = "serenidad_categories";
const AUDIO_CATS_KEY = "serenidad_audio_cats";

// Variables globales
let audioList = [];          // Lista completa desde GitHub O desde descargas (offline)
let currentIndex = -1;
let isPlaying = false;
let downloads = {};          // Audios descargados: { url: { titulo, url, base64 } }
let favorites = {};
let categories = [];
let audioCats = {};
let currentTab = 'Todos';
let playMode = null;
let shuffleQueue = [];
let assigningIndex = -1;
let isOnline = true;

const player = document.getElementById('audioPlayer');

// ========== UTILIDADES ==========
function load(key, def) {
  try { 
    const v = localStorage.getItem(key); 
    return v ? JSON.parse(v) : def; 
  } catch(e) { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function getJsonUrl() { return localStorage.getItem(STORAGE_KEY) || DEFAULT_JSON; }

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) {
    document.getElementById('jsonUrl').value = getJsonUrl();
  }
}

function saveAndReload() {
  const val = document.getElementById('jsonUrl').value.trim();
  if(val) localStorage.setItem(STORAGE_KEY, val);
  document.getElementById('settingsPanel').classList.remove('open');
  loadList();
}

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot ' + (state || '');
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

// ========== DESCARGA CON BASE64 (PERMANENTE) ==========
async function downloadAudio(i) {
  const a = audioList[i];
  if(!a || !a.url) return;
  
  const btn = document.querySelector(`#card-${i} .icon-btn[title="Descargar"]`);
  if(btn) btn.innerHTML = '⏳';
  
  try {
    const response = await fetch(a.url);
    const blob = await response.blob();
    
    // Convertir a Base64 para guardar permanentemente
    const reader = new FileReader();
    reader.onloadend = function() {
      const base64 = reader.result;
      downloads[a.url] = {
        titulo: a.titulo,
        url: a.url,
        base64: base64
      };
      save(DOWNLOADS_KEY, downloads);
      if(btn) btn.innerHTML = '⬇';
      renderList();
      setStatus('✓ Descargado: ' + a.titulo, '');
    };
    reader.readAsDataURL(blob);
  } catch(e) {
    alert('❌ Error al descargar. Verifica tu conexión.');
    if(btn) btn.innerHTML = '⬇';
  }
}

function deleteDownload(i) {
  const a = audioList[i];
  if(downloads[a.url]) {
    delete downloads[a.url];
    save(DOWNLOADS_KEY, downloads);
    renderList();
    setStatus('🗑 Eliminado: ' + a.titulo, '');
  }
}

function clearAllDownloads() {
  if(confirm('¿Borrar TODOS los audios descargados? Esto no se puede deshacer.')) {
    downloads = {};
    save(DOWNLOADS_KEY, downloads);
    renderList();
    setStatus('✓ Todos los audios descargados fueron eliminados', '');
  }
}

// ========== EXPORTAR COPIA ==========
function exportBackup() {
  const backup = {
    downloads: downloads,
    favorites: favorites,
    categories: categories,
    audioCats: audioCats,
    fecha: new Date().toISOString()
  };
  const dataStr = JSON.stringify(backup, null, 2);
  const blob = new Blob([dataStr], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'serenidad_backup_' + new Date().toISOString().slice(0,19) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ========== CARGAR LISTA PRINCIPAL ==========
async function loadList() {
  // Cargar datos guardados
  downloads = load(DOWNLOADS_KEY, {});
  favorites = load(FAVORITES_KEY, {});
  categories = load(CATEGORIES_KEY, []);
  audioCats = load(AUDIO_CATS_KEY, {});
  
  setStatus('Conectando...', 'loading');
  
  try {
    // Intentar cargar desde GitHub
    const response = await fetch(getJsonUrl() + '?t=' + Date.now());
    if(!response.ok) throw new Error('HTTP ' + response.status);
    audioList = await response.json();
    isOnline = true;
    document.getElementById('offlineInfo').style.display = 'none';
    setStatus('✓ ' + audioList.length + ' audios disponibles', '');
  } catch(e) {
    // Sin internet: usar solo descargados
    isOnline = false;
    document.getElementById('offlineInfo').style.display = 'block';
    
    if(Object.keys(downloads).length > 0) {
      audioList = Object.values(downloads).map(d => ({ titulo: d.titulo, url: d.url }));
      setStatus('📴 Modo offline - ' + audioList.length + ' audios descargados', 'offline');
    } else {
      audioList = [];
      setStatus('📴 Sin conexión y sin audios descargados', 'offline');
    }
  }
  
  renderTabs();
  renderList();
}

// ========== RENDER ==========
function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  if(!audioList.length) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'flex';
  
  // Limpiar tabs existentes (excepto el botón +)
  const addBtn = wrap.querySelector('.tab-add');
  const tabsToRemove = wrap.querySelectorAll('.tab');
  tabsToRemove.forEach(t => t.remove());
  
  // Crear tabs
  const allTabs = ['Todos', 'Favoritos', ...categories];
  allTabs.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (currentTab === cat ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat === 'Favoritos' ? '❤️ Favoritos' : cat;
    btn.onclick = () => switchTab(cat);
    wrap.insertBefore(btn, addBtn);
  });
}

function switchTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderList();
}

function getFilteredList() {
  if(!audioList.length) return [];
  
  const listWithIndex = audioList.map((a, i) => ({ ...a, origIndex: i }));
  
  if(currentTab === 'Todos') return listWithIndex;
  if(currentTab === 'Favoritos') return listWithIndex.filter(a => favorites[a.url]);
  return listWithIndex.filter(a => audioCats[a.url] === currentTab);
}

function renderList() {
  const container = document.getElementById('audioList');
  const playAllRow = document.getElementById('playAllRow');
  const clearAllRow = document.getElementById('clearAllRow');
  
  playAllRow.style.display = audioList.length ? 'flex' : 'none';
  clearAllRow.style.display = Object.keys(downloads).length ? 'block' : 'none';
  
  const list = getFilteredList();
  
  if(!list.length) {
    let msg = '';
    if(currentTab === 'Favoritos') msg = '💔 No tienes favoritos aún.\nTocá ❤️ en un audio para agregarlo.';
    else if(currentTab === 'Todos') msg = '🎵 No hay audios disponibles.\nConectate a internet o descarga algunos.';
    else msg = '📂 No hay audios en "' + currentTab + '".\nAsigná audios a esta categoría con el botón 📂.';
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎧</div>' + msg.replace(/\n/g, '<br>') + '</div>';
    return;
  }
  
  container.innerHTML = list.map(a => {
    const i = a.origIndex;
    const dl = downloads[a.url];
    const isFav = favorites[a.url];
    const cat = audioCats[a.url];
    const isActive = (currentIndex === i);
    
    return `<div class="audio-card ${isActive ? 'active' : ''}" id="card-${i}" onclick="playAudio(${i})">
      <div class="play-icon">${isActive && isPlaying ? '⏸' : '▶'}</div>
      <div class="audio-info">
        <div class="audio-title">${escapeHtml(a.titulo)}</div>
        <div class="audio-meta">
          ${dl ? '<span class="badge downloaded">💾 offline</span>' : '<span class="badge online">🌐 online</span>'}
          ${cat ? '<span class="badge cat">📁 ' + escapeHtml(cat) + '</span>' : ''}
        </div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="icon-btn ${isFav ? 'fav-on' : ''}" title="Favorito" onclick="toggleFav(${i})">❤️</button>
        <button class="icon-btn" title="Categoría" onclick="openAssignModal(${i})">📂</button>
        ${!dl ? `<button class="icon-btn" title="Descargar para offline" onclick="downloadAudio(${i})">⬇️</button>` : 
                 `<button class="icon-btn danger" title="Borrar descarga" onclick="deleteDownload(${i})">🗑️</button>`}
      </div>
    </div>`;
  }).join('');
}

function toggleFav(i) {
  const a = audioList[i];
  if(!a) return;
  if(favorites[a.url]) delete favorites[a.url];
  else favorites[a.url] = true;
  save(FAVORITES_KEY, favorites);
  renderList();
}

// ========== CATEGORÍAS ==========
function openNewCatModal() {
  document.getElementById('newCatInput').value = '';
  document.getElementById('newCatModal').classList.add('open');
}

function closeNewCatModal() {
  document.getElementById('newCatModal').classList.remove('open');
}

function confirmNewCat() {
  const val = document.getElementById('newCatInput').value.trim();
  if(!val) return;
  if(!categories.includes(val)) {
    categories.push(val);
    save(CATEGORIES_KEY, categories);
  }
  closeNewCatModal();
  renderTabs();
  switchTab(val);
}

function openAssignModal(i) {
  assigningIndex = i;
  const a = audioList[i];
  if(!a) return;
  document.getElementById('assignCatTitle').textContent = a.titulo;
  const listDiv = document.getElementById('assignCatList');
  
  if(!categories.length) {
    listDiv.innerHTML = '<div style="color:var(--muted);padding:16px;text-align:center">📭 No hay categorías.<br>Creá una con el botón + arriba.</div>';
  } else {
    const currentCat = audioCats[a.url] || '';
    listDiv.innerHTML = `<button class="cat-option" style="color:var(--danger);border-color:rgba(248,81,73,0.2)" onclick="assignCat('')">✕ Sin categoría</button>` +
      categories.map(cat => `<button class="cat-option" onclick="assignCat('${cat.replace(/'/g, "\\'")}')">${escapeHtml(cat)} ${currentCat === cat ? ' ✓' : ''}</button>`).join('');
  }
  document.getElementById('assignCatModal').classList.add('open');
}

function assignCat(cat) {
  const a = audioList[assigningIndex];
  if(!a) return;
  if(cat === '') delete audioCats[a.url];
  else audioCats[a.url] = cat;
  save(AUDIO_CATS_KEY, audioCats);
  closeAssignModal();
  renderList();
}

function closeAssignModal() {
  document.getElementById('assignCatModal').classList.remove('open');
  assigningIndex = -1;
}

// ========== REPRODUCCIÓN ==========
function playAll() {
  const list = getFilteredList();
  if(!list.length) return;
  playMode = 'all';
  document.querySelectorAll('.btn-mode').forEach((b, idx) => b.classList.toggle('active', idx === 0));
  playAudio(list[0].origIndex);
}

function playShuffle() {
  const list = getFilteredList();
  if(!list.length) return;
  playMode = 'shuffle';
  document.querySelectorAll('.btn-mode').forEach((b, idx) => b.classList.toggle('active', idx === 1));
  const shuffled = [...list].sort(() => Math.random() - 0.5);
  shuffleQueue = shuffled.map(a => a.origIndex);
  playAudio(shuffleQueue.shift());
}

function playAudio(i) {
  const a = audioList[i];
  if(!a) return;
  
  const dl = downloads[a.url];
  let audioSrc;
  
  if(dl && dl.base64) {
    audioSrc = dl.base64;  // Usar el audio descargado (base64)
  } else if(a.url) {
    audioSrc = a.url;       // Usar URL online
  } else {
    return;
  }
  
  if(currentIndex === i) {
    togglePlay();
    return;
  }
  
  currentIndex = i;
  player.src = audioSrc;
  player.load();
  player.play().catch(e => console.log('Error reproduciendo:', e));
  isPlaying = true;
  document.getElementById('playerBar').classList.add('visible');
  document.getElementById('playerTitle').textContent = a.titulo;
  document.getElementById('playPauseBtn').innerHTML = '⏸';
  renderList();
}

function togglePlay() {
  if(player.paused) {
    player.play();
    isPlaying = true;
  } else {
    player.pause();
    isPlaying = false;
  }
  document.getElementById('playPauseBtn').innerHTML = isPlaying ? '⏸' : '▶';
  const card = document.getElementById('card-' + currentIndex);
  if(card) card.querySelector('.play-icon').innerHTML = isPlaying ? '⏸' : '▶';
}

function skipAudio(sec) {
  player.currentTime = Math.max(0, Math.min(player.duration || 0, player.currentTime + sec));
}

function seekAudio(e) {
  if(!player.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  player.currentTime = percent * player.duration;
}

function fmt(s) {
  if(isNaN(s)) return '0:00';
  const mins = Math.floor(s / 60);
  const secs = Math.floor(s % 60);
  return mins + ':' + (secs < 10 ? '0' : '') + secs;
}

// Eventos del player
player.addEventListener('timeupdate', () => {
  if(!player.duration) return;
  document.getElementById('progressFill').style.width = (player.currentTime / player.duration * 100) + '%';
  document.getElementById('timeElapsed').textContent = fmt(player.currentTime);
  document.getElementById('timeDuration').textContent = fmt(player.duration);
});

player.addEventListener('ended', () => {
  isPlaying = false;
  document.getElementById('playPauseBtn').innerHTML = '▶';
  const card = document.getElementById('card-' + currentIndex);
  if(card) card.querySelector('.play-icon').innerHTML = '▶';
  
  const list = getFilteredList();
  if(playMode === 'all') {
    const idx = list.findIndex(a => a.origIndex === currentIndex);
    if(idx >= 0 && idx + 1 < list.length) playAudio(list[idx + 1].origIndex);
    else playMode = null;
  } else if(playMode === 'shuffle') {
    if(shuffleQueue.length > 0) playAudio(shuffleQueue.shift());
    else playMode = null;
  }
});

// Iniciar
loadList();
</script>
</body>
</html>
