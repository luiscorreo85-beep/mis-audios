<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Serenidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: rgba(255,255,255,0.07);
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #a8d8b9;
    --accent2: #6ab187;
    --danger: #f85149;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 20px;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: #a8d8b9; top: -120px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: #6ab187; bottom: 80px; left: -80px; }
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 24px 140px;
  }
  header { margin-bottom: 32px; }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    line-height: 1.15;
    color: var(--text);
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle {
    font-size: 16px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  /* Settings */
  .settings-btn {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 42px; height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: color 0.2s, border-color 0.2s;
  }
  .settings-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .settings-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 32px;
  }
  .settings-panel.open { display: block; }
  .settings-panel label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }
  .settings-panel input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: monospace;
    outline: none;
  }
  .settings-panel input:focus { border-color: var(--accent2); }
  .settings-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-sm {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-sm:hover { background: var(--surface2); }
  .btn-sm.accent { border-color: var(--accent2); color: var(--accent); }
  .btn-sm.danger { border-color: rgba(248,81,73,0.3); color: var(--danger); }

  /* Status */
  .status {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .dot.offline { background: var(--muted); animation: none; }
  .dot.loading { background: #e3b341; }

  /* Tabs */
  .tabs-wrap {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 18px;
    font-size: 15px;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent2); }
  .tab-add {
    padding: 10px 14px;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    margin-bottom: -1px;
  }
  .tab-add:hover { color: var(--accent); }

  /* Category modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 90%;
    max-width: 360px;
  }
  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 16px;
  }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 12px;
    font-size: 16px;
    outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--accent2); }
  .modal-row { display: flex; gap: 8px; }

  /* Assign category modal */
  .cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 300px; overflow-y: auto; }
  .cat-option {
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s;
  }
  .cat-option:hover { border-color: var(--accent2); color: var(--accent); }

  /* Play all row */
  .play-all-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .btn-mode {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-mode:hover { background: var(--surface2); }
  .btn-mode.active { border-color: var(--accent2); color: var(--accent); }

  /* Audio list */
  .audio-list { display: flex; flex-direction: column; gap: 10px; }
  .audio-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .audio-card:hover { border-color: rgba(168,216,185,0.25); background: var(--surface2); }
  .audio-card.active { border-color: var(--accent2); background: rgba(106,177,135,0.06); }
  .play-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .audio-card.active .play-icon { background: var(--accent2); border-color: var(--accent2); color: #0d1117; }
  .audio-info { flex: 1; min-width: 0; }
  .audio-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .audio-meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
  }
  .badge.downloaded { color: var(--accent); border-color: rgba(168,216,185,0.3); }
  .badge.online { color: #e3b341; border-color: rgba(227,179,65,0.3); }
  .badge.cat { color: var(--muted); border-color: var(--border); }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .icon-btn.fav-on { color: #e3b341; border-color: rgba(227,179,65,0.3); }
  .icon-btn.danger:hover { color: var(--danger); border-color: rgba(248,81,73,0.3); }

  /* Player bar */
  .player-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,17,23,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 14px 20px 28px;
    z-index: 50;
    display: none;
  }
  .player-bar.visible { display: block; }
  .player-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .progress-wrap {
    position: relative;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 14px;
  }
  .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
  .player-controls { display: flex; align-items: center; justify-content: space-between; }
  .time { font-size: 13px; color: var(--muted); min-width: 70px; }
  .time.right { text-align: right; }
  .ctrl-main { display: flex; align-items: center; gap: 20px; }
  .ctrl-btn {
    background: none; border: none;
    color: var(--muted);
    font-size: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s; padding: 0;
  }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.play-pause {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--accent2);
    color: #0d1117;
    font-size: 24px;
    border: none;
  }
  .ctrl-btn.play-pause:hover { background: var(--accent); }
  audio { display: none; }

  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }

  .clear-all { text-align: right; margin-bottom: 12px; }
  .clear-all button {
    background: none; border: none;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .clear-all button:hover { color: var(--danger); }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<button class="settings-btn" onclick="toggleSettings()">⚙</button>
<audio id="audioPlayer"></audio>

<!-- Modal nueva categoría -->
<div class="modal-overlay" id="newCatModal">
  <div class="modal">
    <h3>Nueva categoría</h3>
    <input type="text" id="newCatInput" placeholder="Ej: Meditación" />
    <div class="modal-row">
      <button class="btn-sm accent" onclick="confirmNewCat()">Crear</button>
      <button class="btn-sm" onclick="closeNewCatModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal asignar categoría -->
<div class="modal-overlay" id="assignCatModal">
  <div class="modal">
    <h3 id="assignCatTitle">Asignar categoría</h3>
    <div class="cat-list" id="assignCatList"></div>
    <button class="btn-sm" onclick="closeAssignModal()">Cancelar</button>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="logo">Bienestar · Audio</div>
    <h1>Encuentra tu <em>calma</em></h1>
    <p class="subtitle">Oraciones, historias y meditaciones para aliviar la ansiedad.</p>
  </header>

  <div class="settings-panel" id="settingsPanel">
    <label>Link del lista.json</label>
    <input type="text" id="jsonUrl" placeholder="https://raw.githubusercontent.com/..." />
    <div class="settings-row">
      <button class="btn-sm accent" onclick="saveAndReload()">Guardar y recargar</button>
      <button class="btn-sm danger" onclick="clearAllDownloads()">Borrar todo descargado</button>
    </div>
  </div>

  <div class="status" id="statusBar">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">Cargando lista...</span>
  </div>

  <div class="tabs-wrap" id="tabsWrap" style="display:none">
    <button class="tab active" data-cat="Todos" onclick="switchTab('Todos')">Todos</button>
    <button class="tab" data-cat="Favoritos" onclick="switchTab('Favoritos')">❤ Favoritos</button>
    <button class="tab-add" onclick="openNewCatModal()" title="Nueva categoría">+</button>
  </div>

  <div class="play-all-row" id="playAllRow" style="display:none">
    <button class="btn-mode" onclick="playAll()">▶▶ En orden</button>
    <button class="btn-mode" onclick="playShuffle()">🔀 Aleatorio</button>
  </div>

  <div class="clear-all" id="clearAllRow" style="display:none">
    <button onclick="clearAllDownloads()">🗑 borrar todos los descargados</button>
  </div>

  <div class="audio-list" id="audioList"></div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-title" id="playerTitle">—</div>
  <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="player-controls">
    <span class="time" id="timeElapsed">0:00</span>
    <div class="ctrl-main">
      <button class="ctrl-btn" onclick="skipAudio(-15)">⟪</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="skipAudio(15)">⟫</button>
    </div>
    <span class="time right" id="timeDuration">0:00</span>
  </div>
</div>

<script>
const DEFAULT_JSON = "https://raw.githubusercontent.com/luiscorreo85-beep/mis-audios/main/lista.json";
const STORAGE_KEY = "serenidad_json_url";
const DOWNLOADS_KEY = "serenidad_downloads";
const FAVORITES_KEY = "serenidad_favorites";
const CATEGORIES_KEY = "serenidad_categories";
const AUDIO_CATS_KEY = "serenidad_audio_cats";

let audioList = [];
let currentIndex = -1;
let isPlaying = false;
let downloads = {};
let favorites = {};
let categories = [];
let audioCats = {};
let currentTab = 'Todos';
let playMode = null;
let shuffleQueue = [];
let assigningIndex = -1;

const player = document.getElementById('audioPlayer');

function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getJsonUrl() { return localStorage.getItem(STORAGE_KEY) || DEFAULT_JSON; }

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) document.getElementById('jsonUrl').value = getJsonUrl();
}

function saveAndReload() {
  const val = document.getElementById('jsonUrl').value.trim();
  if (val) localStorage.setItem(STORAGE_KEY, val);
  document.getElementById('settingsPanel').classList.remove('open');
  loadList();
}

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot ' + (state || '');
}

async function loadList() {
  downloads = load(DOWNLOADS_KEY, {});
  favorites = load(FAVORITES_KEY, {});
  categories = load(CATEGORIES_KEY, []);
  audioCats = load(AUDIO_CATS_KEY, {});
  setStatus('Cargando lista...', 'loading');
  try {
    const r = await fetch(getJsonUrl() + '?t=' + Date.now());
    if (!r.ok) throw new Error('Error ' + r.status);
    audioList = await r.json();
    setStatus('Actualizado · ' + audioList.length + ' audio' + (audioList.length !== 1 ? 's' : ''), '');
    renderTabs();
    renderList();
  } catch(e) {
    setStatus('Sin conexión — usando caché local', 'offline');
    if (Object.keys(downloads).length > 0) {
      audioList = Object.values(downloads).map(d => ({ titulo: d.titulo, url: d.url }));
      renderTabs();
      renderList();
    } else {
      document.getElementById('audioList').innerHTML = '<div class="empty"><div class="empty-icon">☁</div>No hay conexión y no hay audios descargados.</div>';
    }
  }
}

function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.style.display = 'flex';
  const existing = wrap.querySelectorAll('.tab');
  existing.forEach(t => t.remove());
  const addBtn = wrap.querySelector('.tab-add');

  const all = document.createElement('button');
  all.className = 'tab' + (currentTab === 'Todos' ? ' active' : '');
  all.dataset.cat = 'Todos';
  all.textContent = 'Todos';
  all.onclick = () => switchTab('Todos');
  wrap.insertBefore(all, addBtn);

  const fav = document.createElement('button');
  fav.className = 'tab' + (currentTab === 'Favoritos' ? ' active' : '');
  fav.dataset.cat = 'Favoritos';
  fav.textContent = '❤ Favoritos';
  fav.onclick = () => switchTab('Favoritos');
  wrap.insertBefore(fav, addBtn);

  categories.forEach(cat => {
    const t = document.createElement('button');
    t.className = 'tab' + (currentTab === cat ? ' active' : '');
    t.dataset.cat = cat;
    t.textContent = cat;
    t.onclick = () => switchTab(cat);
    wrap.insertBefore(t, addBtn);
  });
}

function switchTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderList();
}

function getFilteredList() {
  if (currentTab === 'Todos') return audioList.map((a, i) => ({ ...a, origIndex: i }));
  if (currentTab === 'Favoritos') return audioList.map((a, i) => ({ ...a, origIndex: i })).filter(a => favorites[a.url]);
  return audioList.map((a, i) => ({ ...a, origIndex: i })).filter(a => audioCats[a.url] === currentTab);
}

function renderList() {
  const container = document.getElementById('audioList');
  document.getElementById('playAllRow').style.display = 'flex';
  document.getElementById('clearAllRow').style.display = Object.keys(downloads).length > 0 ? 'block' : 'none';

  const list = getFilteredList();

  if (!list.length) {
    const msg = currentTab === 'Favoritos' ? 'No hay favoritos aún.<br>Tocá ❤ en un audio para agregarlo.' :
                currentTab === 'Todos' ? 'No hay audios en la lista.' :
                'No hay audios en esta categoría.<br>Tocá 📂 en un audio para asignarlo.';
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎵</div>' + msg + '</div>';
    return;
  }

  container.innerHTML = list.map((a) => {
    const i = a.origIndex;
    const dl = downloads[a.url];
    const isFav = favorites[a.url];
    const cat = audioCats[a.url];
    const isActive = currentIndex === i;
    return `<div class="audio-card ${isActive ? 'active' : ''}" id="card-${i}" onclick="playAudio(${i})">
      <div class="play-icon">${isActive && isPlaying ? '⏸' : '▶'}</div>
      <div class="audio-info">
        <div class="audio-title">${a.titulo}</div>
        <div class="audio-meta">
          ${dl ? '<span class="badge downloaded">descargado</span>' : '<span class="badge online">online</span>'}
          ${cat ? '<span class="badge cat">' + cat + '</span>' : ''}
        </div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="icon-btn ${isFav ? 'fav-on' : ''}" title="Favorito" onclick="toggleFav(${i})">❤</button>
        <button class="icon-btn" title="Categoría" onclick="openAssignModal(${i})">📂</button>
        ${!dl ? `<button class="icon-btn" title="Descargar" onclick="downloadAudio(${i})">⬇</button>` : ''}
        ${dl ? `<button class="icon-btn danger" title="Borrar descarga" onclick="deleteDownload(${i})">🗑</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleFav(i) {
  const a = audioList[i];
  if (favorites[a.url]) delete favorites[a.url];
  else favorites[a.url] = true;
  save(FAVORITES_KEY, favorites);
  renderList();
}

function openAssignModal(i) {
  assigningIndex = i;
  const a = audioList[i];
  document.getElementById('assignCatTitle').textContent = a.titulo;
  const list = document.getElementById('assignCatList');
  const allCats = categories.length ? categories : [];
  if (!allCats.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:14px;">No hay categorías.<br>Creá una con el botón + arriba.</div>';
  } else {
    list.innerHTML = allCats.map(cat =>
      `<button class="cat-option" onclick="assignCat('${cat}')">${cat}</button>`
    ).join('');
  }
  document.getElementById('assignCatModal').classList.add('open');
}

function assignCat(cat) {
  const a = audioList[assigningIndex];
  audioCats[a.url] = cat;
  save(AUDIO_CATS_KEY, audioCats);
  closeAssignModal();
  renderList();
}

function closeAssignModal() {
  document.getElementById('assignCatModal').classList.remove('open');
  assigningIndex = -1;
}

function openNewCatModal() {
  document.getElementById('newCatInput').value = '';
  document.getElementById('newCatModal').classList.add('open');
  setTimeout(() => document.getElementById('newCatInput').focus(), 100);
}

function closeNewCatModal() {
  document.getElementById('newCatModal').classList.remove('open');
}

function confirmNewCat() {
  const val = document.getElementById('newCatInput').value.trim();
  if (!val) return;
  if (!categories.includes(val)) {
    categories.push(val);
    save(CATEGORIES_KEY, categories);
  }
  closeNewCatModal();
  renderTabs();
  switchTab(val);
}

function playAll() {
  const list = getFilteredList();
  if (!list.length) return;
  playMode = 'all';
  document.querySelectorAll('.btn-mode').forEach((b,i) => b.classList.toggle('active', i===0));
  playAudio(list[0].origIndex);
}

function playShuffle() {
  const list = getFilteredList();
  if (!list.length) return;
  playMode = 'shuffle';
  document.querySelectorAll('.btn-mode').forEach((b,i) => b.classList.toggle('active', i===1));
  const shuffled = [...list].sort(() => Math.random() - 0.5);
  shuffleQueue = shuffled.map(a => a.origIndex);
  playAudio(shuffleQueue.shift());
}

function playAudio(i) {
  const a = audioList[i];
  const dl = downloads[a.url];
  const src = dl ? dl.blob : a.url;
  if (currentIndex === i) { togglePlay(); return; }
  currentIndex = i;
  player.src = src;
  player.play();
  isPlaying = true;
  document.getElementById('playerBar').classList.add('visible');
  document.getElementById('playerTitle').textContent = a.titulo;
  document.getElementById('playPauseBtn').innerHTML = '⏸';
  renderList();
}

function togglePlay() {
  if (player.paused) { player.play(); isPlaying = true; }
  else { player.pause(); isPlaying = false; }
  document.getElementById('playPauseBtn').innerHTML = isPlaying ? '⏸' : '▶';
  const card = document.getElementById('card-' + currentIndex);
  if (card) card.querySelector('.play-icon').innerHTML = isPlaying ? '⏸' : '▶';
}

function skipAudio(sec) {
  player.currentTime = Math.max(0, Math.min(player.duration || 0, player.currentTime + sec));
}

function seekAudio(e) {
  if (!player.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  player.currentTime = ((e.clientX - rect.left) / rect.width) * player.duration;
}

function fmt(s) {
  if (isNaN(s)) return '0:00';
  return Math.floor(s/60) + ':' + Math.floor(s%60).toString().padStart(2,'0');
}

player.addEventListener('timeupdate', () => {
  if (!player.duration) return;
  document.getElementById('progressFill').style.width = (player.currentTime/player.duration*100) + '%';
  document.getElementById('timeElapsed').textContent = fmt(player.currentTime);
  document.getElementById('timeDuration').textContent = fmt(player.duration);
});

player.addEventListener('ended', () => {
  isPlaying = false;
  document.getElementById('playPauseBtn').innerHTML = '▶';
  const card = document.getElementById('card-' + currentIndex);
  if (card) card.querySelector('.play-icon').innerHTML = '▶';
  const list = getFilteredList();
  if (playMode === 'all') {
    const idx = list.findIndex(a => a.origIndex === currentIndex);
    if (idx >= 0 && idx + 1 < list.length) playAudio(list[idx+1].origIndex);
    else playMode = null;
  } else if (playMode === 'shuffle') {
    if (shuffleQueue.length > 0) playAudio(shuffleQueue.shift());
    else playMode = null;
  }
});

async function downloadAudio(i) {
  const a = audioList[i];
  try {
    const btn = document.querySelector(`#card-${i} .icon-btn[title="Descargar"]`);
    if (btn) btn.innerHTML = '⏳';
    const r = await fetch(a.url);
    const blob = await r.blob();
    const blobUrl = URL.createObjectURL(blob);
    downloads[a.url] = { titulo: a.titulo, url: a.url, blob: blobUrl };
    save(DOWNLOADS_KEY, downloads);
    renderList();
  } catch(e) {
    alert('No se pudo descargar. Verificá la conexión.');
  }
}

function deleteDownload(i) {
  const a = audioList[i];
  if (downloads[a.url]) { URL.revokeObjectURL(downloads[a.url].blob); delete downloads[a.url]; save(DOWNLOADS_KEY, downloads); renderList(); }
}

function clearAllDownloads() {
  Object.values(downloads).forEach(d => URL.revokeObjectURL(d.blob));
  downloads = {};
  save(DOWNLOADS_KEY, downloads);
  renderList();
}

loadList();
</script>
</body>
</html>
