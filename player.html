<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Serenidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: rgba(255,255,255,0.07);
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #a8d8b9;
    --accent2: #6ab187;
    --danger: #f85149;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 20px;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: #a8d8b9; top: -120px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: #6ab187; bottom: 80px; left: -80px; }
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 24px 120px;
  }
  header { margin-bottom: 40px; }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    line-height: 1.15;
    color: var(--text);
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle {
    font-size: 16px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.6;
  }

  /* Settings */
  .settings-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: color 0.2s, border-color 0.2s;
  }
  .settings-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .settings-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 32px;
  }
  .settings-panel.open { display: block; }
  .settings-panel label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }
  .settings-panel input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }
  .settings-panel input:focus { border-color: var(--accent2); }
  .settings-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn-sm {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-sm:hover { background: var(--surface2); }
  .btn-sm.accent { border-color: var(--accent2); color: var(--accent); }
  .btn-sm.danger { border-color: rgba(248,81,73,0.3); color: var(--danger); }

  /* Status */
  .status {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .dot.offline { background: var(--muted); animation: none; }
  .dot.loading { background: #e3b341; }

  /* List */
  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .audio-list { display: flex; flex-direction: column; gap: 10px; }
  .audio-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .audio-card:hover { border-color: rgba(168,216,185,0.25); background: var(--surface2); }
  .audio-card.active {
    border-color: var(--accent2);
    background: rgba(106,177,135,0.06);
  }
  .play-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .audio-card.active .play-icon {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #0d1117;
  }
  .audio-info { flex: 1; min-width: 0; }
  .audio-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .audio-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    border: 1px solid;
  }
  .badge.downloaded { color: var(--accent); border-color: rgba(168,216,185,0.3); }
  .badge.new { color: #e3b341; border-color: rgba(227,179,65,0.3); }
  .card-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .icon-btn.danger:hover { color: var(--danger); border-color: rgba(248,81,73,0.3); }

  /* Player sticky */
  .player-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 14px 20px 24px;
    z-index: 50;
    display: none;
  }
  .player-bar.visible { display: block; }
  .player-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .progress-wrap {
    position: relative;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }
  .player-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .time {
    font-size: 11px;
    color: var(--muted);
    min-width: 70px;
  }
  .time.right { text-align: right; }
  .ctrl-main {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
    padding: 0;
  }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.play-pause {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--accent2);
    color: #0d1117;
    font-size: 24px;
    border: none;
  }
  .ctrl-btn.play-pause:hover { background: var(--accent); }
  audio { display: none; }

  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }

  .play-all-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .btn-mode {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-mode:hover { background: var(--surface2); }
  .btn-mode.active { border-color: var(--accent2); color: var(--accent); }
  .clear-all {
    text-align: right;
    margin-bottom: 12px;
  }
  .clear-all button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .clear-all button:hover { color: var(--danger); }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<button class="settings-btn" onclick="toggleSettings()" title="Configuración">⚙</button>
<audio id="audioPlayer"></audio>

<div class="wrap">
  <header>
    <div class="logo">Bienestar · Audio</div>
    <h1>Encuentra tu <em>calma</em></h1>
    <p class="subtitle">Oraciones, historias y meditaciones para aliviar la ansiedad.</p>
  </header>

  <div class="settings-panel" id="settingsPanel">
    <label>Link del lista.json</label>
    <input type="text" id="jsonUrl" placeholder="https://raw.githubusercontent.com/..." />
    <div class="settings-row">
      <button class="btn-sm accent" onclick="saveAndReload()">Guardar y recargar</button>
      <button class="btn-sm danger" onclick="clearAllDownloads()">Borrar todo descargado</button>
    </div>
  </div>

  <div class="status" id="statusBar">
    <div class="dot loading" id="statusDot"></div>
    <span id="statusText">Cargando lista...</span>
  </div>

  <div class="section-label" id="listLabel" style="display:none">Biblioteca</div>
  <div class="play-all-row" id="playAllRow" style="display:none">
    <button class="btn-mode" onclick="playAll()">▶▶ En orden</button>
    <button class="btn-mode" onclick="playShuffle()">🔀 Aleatorio</button>
  </div>
  <div class="clear-all" id="clearAllRow" style="display:none">
    <button onclick="clearAllDownloads()">🗑 borrar todos los descargados</button>
  </div>
  <div class="audio-list" id="audioList"></div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-title" id="playerTitle">—</div>
  <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="player-controls">
    <span class="time" id="timeElapsed">0:00</span>
    <div class="ctrl-main">
      <button class="ctrl-btn" onclick="skipAudio(-15)" title="−15s">⟪</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="skipAudio(15)" title="+15s">⟫</button>
    </div>
    <span class="time right" id="timeDuration">0:00</span>
  </div>
</div>

<script>
const DEFAULT_JSON = "https://raw.githubusercontent.com/luiscorreo85-beep/mis-audios/main/lista.json";
const STORAGE_KEY = "serenidad_json_url";
const DOWNLOADS_KEY = "serenidad_downloads";

let playMode = null; // 'all' | 'shuffle' | null
let shuffleQueue = [];

function playAll() {
  playMode = 'all';
  document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.btn-mode')[0].classList.add('active');
  playAudio(0);
}

function playShuffle() {
  playMode = 'shuffle';
  document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.btn-mode')[1].classList.add('active');
  shuffleQueue = [...Array(audioList.length).keys()].sort(() => Math.random() - 0.5);
  playAudio(shuffleQueue.shift());
}


let currentIndex = -1;
let isPlaying = false;
let downloads = {};

const player = document.getElementById('audioPlayer');

function getJsonUrl() {
  return localStorage.getItem(STORAGE_KEY) || DEFAULT_JSON;
}

function loadDownloads() {
  try { downloads = JSON.parse(localStorage.getItem(DOWNLOADS_KEY) || "{}"); } catch(e) { downloads = {}; }
}

function saveDownloads() {
  localStorage.setItem(DOWNLOADS_KEY, JSON.stringify(downloads));
}

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    document.getElementById('jsonUrl').value = getJsonUrl();
  }
}

function saveAndReload() {
  const val = document.getElementById('jsonUrl').value.trim();
  if (val) localStorage.setItem(STORAGE_KEY, val);
  document.getElementById('settingsPanel').classList.remove('open');
  loadList();
}

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'dot ' + (state || '');
}

async function loadList() {
  loadDownloads();
  setStatus('Cargando lista...', 'loading');
  const url = getJsonUrl();
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) throw new Error('Error ' + r.status);
    audioList = await r.json();
    setStatus('Actualizado · ' + audioList.length + ' audio' + (audioList.length !== 1 ? 's' : ''), '');
    renderList();
  } catch(e) {
    setStatus('Sin conexión — usando caché local', 'offline');
    document.getElementById('statusDot').classList.add('offline');
    if (Object.keys(downloads).length > 0) {
      audioList = Object.values(downloads).map(d => ({ titulo: d.titulo, url: d.url }));
      renderList();
    } else {
      document.getElementById('audioList').innerHTML = '<div class="empty"><div class="empty-icon">☁</div>No hay conexión y no hay audios descargados.</div>';
    }
  }
}

function renderList() {
  const container = document.getElementById('audioList');
  document.getElementById('listLabel').style.display = 'block';
  document.getElementById('playAllRow').style.display = 'flex';

  const hasDownloads = Object.keys(downloads).length > 0;
  document.getElementById('clearAllRow').style.display = hasDownloads ? 'block' : 'none';

  if (!audioList.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎵</div>No hay audios en la lista.</div>';
    return;
  }

  container.innerHTML = audioList.map((a, i) => {
    const dl = downloads[a.url];
    const isActive = currentIndex === i;
    const isNew = !dl;
    return `<div class="audio-card ${isActive ? 'active' : ''}" id="card-${i}" onclick="playAudio(${i})">
      <div class="play-icon">${isActive && isPlaying ? '⏸' : '▶'}</div>
      <div class="audio-info">
        <div class="audio-title">${a.titulo}</div>
        <div class="audio-meta">
          ${dl ? '<span class="badge downloaded">descargado</span>' : ''}
          ${isNew && !dl ? '<span class="badge new">online</span>' : ''}
        </div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        ${!dl ? `<button class="icon-btn" title="Descargar" onclick="downloadAudio(${i})">⬇</button>` : ''}
        ${dl ? `<button class="icon-btn danger" title="Borrar descarga" onclick="deleteDownload(${i})">🗑</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function playAudio(i) {
  const a = audioList[i];
  const dl = downloads[a.url];
  const src = dl ? dl.blob : a.url;

  if (currentIndex === i) {
    togglePlay();
    return;
  }

  currentIndex = i;
  player.src = src;
  player.play();
  isPlaying = true;
  updatePlayerBar(a.titulo);
  renderList();
}

function togglePlay() {
  if (player.paused) {
    player.play();
    isPlaying = true;
  } else {
    player.pause();
    isPlaying = false;
  }
  document.getElementById('playPauseBtn').innerHTML = isPlaying ? '⏸' : '▶';
  if (currentIndex >= 0) {
    const card = document.getElementById('card-' + currentIndex);
    if (card) card.querySelector('.play-icon').innerHTML = isPlaying ? '⏸' : '▶';
  }
}

function updatePlayerBar(titulo) {
  document.getElementById('playerBar').classList.add('visible');
  document.getElementById('playerTitle').textContent = titulo;
  document.getElementById('playPauseBtn').innerHTML = '⏸';
}

function skipAudio(sec) {
  player.currentTime = Math.max(0, Math.min(player.duration || 0, player.currentTime + sec));
}

function seekAudio(e) {
  if (!player.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  player.currentTime = pct * player.duration;
}

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60).toString().padStart(2, '0');
  return m + ':' + ss;
}

player.addEventListener('timeupdate', () => {
  if (!player.duration) return;
  const pct = (player.currentTime / player.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeElapsed').textContent = fmt(player.currentTime);
  document.getElementById('timeDuration').textContent = fmt(player.duration);
});

player.addEventListener('ended', () => {
  isPlaying = false;
  document.getElementById('playPauseBtn').innerHTML = '▶';
  if (currentIndex >= 0) {
    const card = document.getElementById('card-' + currentIndex);
    if (card) card.querySelector('.play-icon').innerHTML = '▶';
  }
  if (playMode === 'all') {
    const next = currentIndex + 1;
    if (next < audioList.length) playAudio(next);
    else playMode = null;
  } else if (playMode === 'shuffle') {
    if (shuffleQueue.length > 0) playAudio(shuffleQueue.shift());
    else playMode = null;
  }
});

async function downloadAudio(i) {
  const a = audioList[i];
  try {
    const btn = document.querySelector(`#card-${i} .icon-btn`);
    if (btn) btn.innerHTML = '⏳';
    const r = await fetch(a.url);
    const blob = await r.blob();
    const blobUrl = URL.createObjectURL(blob);
    downloads[a.url] = { titulo: a.titulo, url: a.url, blob: blobUrl };
    saveDownloads();
    renderList();
  } catch(e) {
    alert('No se pudo descargar. Verificá la conexión.');
  }
}

function deleteDownload(i) {
  const a = audioList[i];
  if (downloads[a.url]) {
    URL.revokeObjectURL(downloads[a.url].blob);
    delete downloads[a.url];
    saveDownloads();
    renderList();
  }
}

function clearAllDownloads() {
  Object.values(downloads).forEach(d => URL.revokeObjectURL(d.blob));
  downloads = {};
  saveDownloads();
  renderList();
}

loadList();
</script>
</body>
</html>
